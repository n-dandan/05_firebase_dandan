<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LTイベント 管理画面</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 768px) {
      .admin-grid { grid-template-columns: 1fr; }
    }

    .survey-item {
      border: 1px solid #e5e5e7;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      background-color: #fafafa;
    }
    .survey-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }
    .survey-item-question {
      font-weight: 600;
      font-size: 15px;
      flex: 1;
    }
    .survey-item-meta {
      font-size: 12px;
      color: #86868b;
      margin-bottom: 8px;
    }
    .survey-item-options {
      font-size: 13px;
      color: #424245;
    }
    .survey-item-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .status-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .status-active {
      background-color: #d4edda;
      color: #155724;
    }
    .status-inactive {
      background-color: #f0f0f3;
      color: #6e6e73;
    }
    .status-displaying {
      background-color: #cce5ff;
      color: #004085;
    }
    .btn-success {
      background-color: #34c759;
      color: #ffffff;
    }
    .btn-success:hover { background-color: #28a745; }
    .btn-success.active-display {
      background-color: #0056b3;
    }
    .survey-item.is-displayed {
      border-color: #34c759;
      background-color: #f0fff4;
    }
    .option-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .option-input-row input { flex: 1; }
    .login-container {
      max-width: 400px;
      margin: 80px auto;
    }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen">
    <div class="login-container">
      <section class="section">
        <h2 class="section-title">管理者ログイン</h2>

        <div id="login-alert"></div>

        <div class="form-group">
          <label for="login-email" class="form-label">メールアドレス</label>
          <input type="email" id="login-email" class="form-input" placeholder="admin@example.com">
        </div>

        <div class="form-group">
          <label for="login-password" class="form-label">パスワード</label>
          <input type="password" id="login-password" class="form-input" placeholder="パスワード">
        </div>

        <button id="login-btn" class="btn btn-primary" style="width: 100%;">ログイン</button>
      </section>
    </div>
  </div>

  <!-- 管理画面本体 -->
  <div id="admin-screen" class="hidden">
    <header class="header">
      <div>
        <h1>管理画面</h1>
        <p class="subtitle" id="admin-email"></p>
      </div>
      <button id="logout-btn" class="btn btn-secondary btn-sm">ログアウト</button>
    </header>

    <main class="container-wide">

      <!-- イベント名設定 -->
      <section class="section">
        <h2 class="section-title">イベント名</h2>
        <p style="font-size: 13px; color: #6e6e73; margin-bottom: 12px;">会場スクリーン上部に表示するイベント名を設定します</p>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="event-name-input" class="form-input" placeholder="イベント Live" style="flex: 1;">
          <button id="save-event-name-btn" class="btn btn-primary">保存</button>
        </div>
      </section>

      <!-- QRコード表示コントロール -->
      <section class="section">
        <h2 class="section-title">QRコード表示</h2>
        <p style="font-size: 13px; color: #6e6e73; margin-bottom: 12px;">参加者の投稿画面URLをQRコードで会場スクリーンに表示します</p>
        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px;">
          <button id="toggle-qr-btn" class="btn btn-secondary">QRコードを表示する</button>
        </div>
        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
          <span style="font-size: 13px; color: #424245;">表示位置:</span>
          <button class="btn btn-secondary btn-sm qr-pos-btn" data-pos="top-left">左上</button>
          <button class="btn btn-secondary btn-sm qr-pos-btn" data-pos="top-right">右上</button>
          <button class="btn btn-secondary btn-sm qr-pos-btn" data-pos="bottom-left">左下</button>
          <button class="btn btn-secondary btn-sm qr-pos-btn" data-pos="bottom-right">右下</button>
        </div>
      </section>

      <div class="admin-grid">

        <!-- アンケート管理 -->
        <section class="section">
          <h2 class="section-title">アンケート管理</h2>

          <!-- 新規作成フォーム -->
          <div style="background-color: #fafafa; padding: 16px; border-radius: 10px; margin-bottom: 16px;">
            <h3 style="font-size: 14px; margin-bottom: 12px;" id="survey-form-title">新規アンケートを作成</h3>

            <div class="form-group">
              <label class="form-label">質問文</label>
              <input type="text" id="survey-question" class="form-input" placeholder="例: 今日一番印象的だったテーマは?">
            </div>

            <div class="form-group">
              <label class="form-label">回答形式</label>
              <select id="survey-type" class="form-select">
                <option value="radio">ラジオボタン(単一選択)</option>
                <option value="checkbox">チェックボックス(複数選択)</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">選択肢</label>
              <div id="options-container">
                <div class="option-input-row">
                  <input type="text" class="form-input option-input" placeholder="選択肢1">
                  <button class="btn btn-secondary btn-sm remove-option-btn" type="button">削除</button>
                </div>
                <div class="option-input-row">
                  <input type="text" class="form-input option-input" placeholder="選択肢2">
                  <button class="btn btn-secondary btn-sm remove-option-btn" type="button">削除</button>
                </div>
              </div>
              <button id="add-option-btn" class="btn btn-secondary btn-sm" type="button">+ 選択肢を追加</button>
            </div>

            <div style="display: flex; gap: 8px;">
              <button id="save-survey-btn" class="btn btn-primary">アンケートを作成</button>
              <button id="cancel-edit-btn" class="btn btn-secondary hidden">キャンセル</button>
            </div>
          </div>

          <!-- 既存アンケート一覧 -->
          <h3 style="font-size: 14px; margin-bottom: 8px;">作成済みアンケート</h3>
          <div id="survey-management-list">
            <div class="empty-state">アンケートはまだありません</div>
          </div>
        </section>

        <!-- 投稿コメント一覧 -->
        <section class="section">
          <h2 class="section-title">投稿コメント一覧</h2>
          <div id="admin-comments-list">
            <div class="empty-state">コメントはまだありません</div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>

  <!-- アプリスクリプト -->
  <script src="js/firebase-config.js"></script>
  <script src="js/comment-renderer.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
