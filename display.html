<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LTイベント 会場表示</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/display.css">
</head>
<body class="display-mode">

  <header class="display-header">
    <h1 id="event-name">イベント Live</h1>
    <div class="mode-indicator" id="mode-indicator">コメント表示中</div>
  </header>

  <!-- アンケートモード時のバナー -->
  <div id="survey-banner" class="survey-banner hidden">アンケート回答受付中</div>

  <main class="display-main">
    <div id="display-layout">

      <!-- アンケート結果パネル（アンケートモード時に左側表示） -->
      <div id="survey-view" class="hidden">
        <div id="survey-results-container" class="survey-results-container"></div>
        <div id="survey-empty" class="display-empty">公開中のアンケートはありません</div>
      </div>

      <!-- コメントパネル（常時表示、アンケートモード時は右側） -->
      <div id="comments-view">
        <div id="comments-container" class="comments-grid"></div>
        <div id="comments-empty" class="display-empty">まだコメントはありません</div>
      </div>

    </div>
  </main>

  <!-- QRコードオーバーレイ -->
  <div id="qr-overlay" class="qr-overlay hidden">
    <p class="qr-label">コメント投稿はこちら</p>
    <div id="qrcode-canvas"></div>
    <p class="qr-url-text" id="qr-url-text"></p>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- QRコードライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- アプリスクリプト -->
  <script src="js/firebase-config.js"></script>
  <script src="js/comment-renderer.js"></script>
  <script src="js/display.js"></script>

</body>
</html>
