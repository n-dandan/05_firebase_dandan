<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LTイベント 会場表示</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/display.css">
</head>
<body class="display-mode">

  <header class="display-header">
    <h1>LTイベント Live</h1>
    <div class="mode-indicator" id="mode-indicator">コメント表示中</div>
  </header>

  <main class="display-main">

    <!-- コメント表示モード -->
    <div id="comments-view">
      <div id="comments-container" class="comments-grid"></div>
      <div id="comments-empty" class="display-empty">まだコメントはありません</div>
    </div>

    <!-- アンケート結果表示モード -->
    <div id="survey-view" class="hidden">
      <div id="survey-results-container" class="survey-results-container"></div>
      <div id="survey-empty" class="display-empty">公開中のアンケートはありません</div>
    </div>

  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- アプリスクリプト -->
  <script src="js/firebase-config.js"></script>
  <script src="js/comment-renderer.js"></script>
  <script src="js/display.js"></script>

</body>
</html>
